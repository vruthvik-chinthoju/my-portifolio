    <style>
        /* =========================
   THEME VARIABLES
========================= */
        :root {
            --bg: radial-gradient(circle at top, #0b0f2a, #07081a, #000);
            --text: #ffffff;
            --card: rgba(255, 255, 255, 0.1);
            --icon: #ffffff;
            --accent: #3b82f6;
        }

        .light {
            --bg: #f4f6ff;
            --text: #0b0f2a;
            --card: rgba(0, 0, 0, 0.1);
            --icon: #0b0f2a;
        }

        /* =========================
   BASE
========================= */
        body {
            margin: 0;
            font-family: "Inter", sans-serif;
            color: var(--text);
            background: var(--bg);
            position: relative;
            transition: background 0.3s, color 0.3s;
        }

        /* Background image overlay */
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background: url("./v907-aum-41.jpg") center / cover no-repeat;
            opacity: 0.15;
            z-index: -1;
        }
        .box img{

        }
        .box{
            display: flex;
            justify-content: center;
            flex-direction: column;
            align-items: center;
        }
    </style>
</head>
